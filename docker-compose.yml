# LEGACY compose path.
# Do not use this file for prod or CI/CD deployments.
# Intentional manual use requires: docker compose --profile legacy ...
version: '3.9'

services:
  web:
    profiles: ["legacy"]
    container_name: web
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "procollab.asgi:application"]
    volumes:
      - ./log:/procollab/log
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
    expose:
      - 8000

  nginx:
    profiles: ["legacy"]
    container_name: nginx
    build: ./nginx
    depends_on:
      - web
    ports:
      - "8000:80"

  redis:
    profiles: ["legacy"]
    container_name: redis
    image: redis:8.6.2
    expose:
      - 6379
    volumes:
      - redis-data:/data

  celerys:
    profiles: ["legacy"]
    container_name: api_celery
    restart: always
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    command: bash ./scripts/celery.sh
    depends_on:
      - redis
      - web
    volumes:
      - .:/procollab

volumes:
  log:
  redis-data:
