{% extends "admin/change_form.html" %}
{% load i18n %}

{% block submit_buttons_bottom %}
    {{ block.super }}
    <div class="submit-row">
        <input type="button" class="export-btn" value="Выгрузить результаты" onclick="export_course_results()"/>
    </div>
    <script>
        function export_course_results() {
            {% if object_id %}
                window.open("{% url 'admin:courses_export_results' object_id %}", '_blank').focus()
            {% endif %}
        }
    </script>
{% endblock %}
